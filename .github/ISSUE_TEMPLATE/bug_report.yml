name: Bug Report
description: Report a problem with the NDNS Analytics Dashboard
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the sections below to help us fix it quickly.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `docker compose up -d`
        2. Open http://localhost:3000
        3. See error in container logs
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant container logs, browser console errors, or stack traces.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Dashboard version
      description: What version or image tag are you running?
      placeholder: e.g. latest, v0.1.0, or commit hash
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running it?
      options:
        - Docker Compose (prebuilt image)
        - Docker Compose (built from source)
        - Local development (bun run dev)
        - Other
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Configuration
      description: |
        Share your environment config (redact secrets!).
        Especially: `LOG_MODE`, `LOG_LEVEL`, `NODE_ENV`, `DATABASE_URL` (host only).
      placeholder: |
        NODE_ENV=production
        LOG_MODE=json
        DATABASE_URL=postgres://ndns:***@db:5432/ndns_analytic
    validations:
      required: false
