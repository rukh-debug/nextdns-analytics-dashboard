services:
  app:
    image: ghcr.io/rukh-debug/nextdns-analytics-dashboard:latest
    container_name: ndns-analytics
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: postgres:17-alpine
    container_name: ndns-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ndns
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ndns_analytic
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ndns -d ndns_analytic"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No ports exposed to host — only accessible to app container
    # AUTH_USER, AUTH_PASSWORD, SESSION_SECRET are loaded from .env via the app service

volumes:
  pgdata:
